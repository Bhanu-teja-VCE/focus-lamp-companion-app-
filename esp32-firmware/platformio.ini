; ============================================================
; Focus Lamp — PlatformIO Configuration
; Board: ESP32 WROOM-32 (Gooouuu / DOIT DevKit V1 38-pin)
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor speed — must match Serial.begin() in main.cpp
monitor_speed = 115200

; Force upload port and slower speed for Windows driver stability
upload_port   = COM8
upload_speed  = 460800

; Libraries needed
lib_deps =
    ; WebServer is built-in to ESP32 Arduino core, no extra lib needed
    ; Add here if you later add NeoPixel support:
    ; adafruit/Adafruit NeoPixel @ ^1.12.0
